{% extends 'base.html' %}

{% block content %}
<section class="container">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="glass-card p-4 p-md-5 reveal-up">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
          <div>
            <h2 class="fw-bold mb-1">Plan Your Trip</h2>
            <p class="text-soft mb-0">No login required. Fill details and generate instantly.</p>
          </div>
          <span class="tag-pill">Smart Planner</span>
        </div>

        <form method="post">
          <div class="mb-3">
            <label class="form-label">Destination</label>
            <input type="text" name="destination" class="form-control form-control-lg dark-input" placeholder="e.g., Jaipur" required />
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Number of Days</label>
              <input type="number" min="1" name="days" class="form-control dark-input" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Budget (INR)</label>
              <input type="number" min="1" step="0.01" name="budget" class="form-control dark-input" required />
            </div>
          </div>

          <div class="mt-4">
            <label class="form-label d-block">Interests</label>
            <div class="row g-2">
              {% for interest in interest_options %}
                <div class="col-sm-6 col-md-4">
                  <label class="interest-chip w-100">
                    <input class="form-check-input me-2" type="checkbox" value="{{ interest }}" name="interests" />
                    {{ interest }}
                  </label>
                </div>
              {% endfor %}
            </div>
          </div>

          <button type="submit" class="btn btn-brand mt-4 w-100">Generate Itinerary</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
